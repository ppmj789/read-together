version: "3.9"

# read-together docker-compose
# MVP 단일 서비스 구성 (ADR-TA-02, RQ-NFR-OPS-01)

services:
  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: read-together:latest
    container_name: read-together-app
    restart: unless-stopped       # 비정상 종료 자동 재시작 (RQ-NFR-AVAIL-01)
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - read-together-data:/data  # SQLite DB 영속 저장 (RQ-NFR-AVAIL-02)
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DB_PATH=${DB_PATH:-/data/read_together.db}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - PORT=${PORT:-8000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  read-together-data:
    name: read-together-data
