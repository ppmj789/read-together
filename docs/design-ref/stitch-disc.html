<style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap');

        body {
            background-color: #FBF7EE;
            background-image: radial-gradient(#d1d1d1 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Be Vietnam Pro', sans-serif;
            overflow-x: hidden;
        }

        .font-handwritten {
            font-family: 'Nanum+Pen+Script', 'Syne', cursive;
        }

        .jelly-depth {
            box-shadow: 
                inset -4px -4px 8px rgba(0,0,0,0.1),
                inset 4px 4px 8px rgba(255,255,255,0.8),
                0 4px 12px rgba(174, 203, 235, 0.4);
        }

        .puffy-sticker {
            filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.1));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .puffy-sticker:active {
            transform: scale(0.92);
        }

        .lined-paper {
            background-image: repeating-linear-gradient(transparent, transparent 31px, #e5e7eb 31px, #e5e7eb 32px);
            line-height: 32px;
        }

        .masking-tape {
            background: repeating-linear-gradient(
                45deg,
                rgba(245, 215, 122, 0.7),
                rgba(245, 215, 122, 0.7) 10px,
                rgba(245, 215, 122, 0.5) 10px,
                rgba(245, 215, 122, 0.5) 20px
            );
            mask-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 20" xmlns="http://www.w3.org/2000/svg"><path d="M0 0 L100 0 L98 20 L2 20 Z" fill="black"/></svg>');
        }

        .glossy-highlight {
            position: relative;
        }

        .glossy-highlight::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 8px;
            width: 30%;
            height: 20%;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            filter: blur(2px);
        }

        .film-grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.03;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
        }
    </style>

<main class="px-margin-page py-stack-loose space-y-8">

<button class="flex-1 py-3 px-4 rounded-xl bg-primary-container/80 backdrop-blur-md text-on-primary-container jelly-depth glossy-highlight font-bold flex flex-col items-center justify-center transition-all scale-105">

<button class="w-full py-5 rounded-2xl bg-[#AECBEB] text-primary-fixed-dim font-display-lg text-[18px] jelly-depth glossy-highlight flex items-center justify-center gap-3 active:scale-95 transition-transform">

<nav class="fixed bottom-0 left-0 w-full bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-md flex justify-around items-center px-4 pb-6 pt-2 shadow-lg z-50 rounded-t-xl">

<script>
        // Micro-interactions for stars
        document.querySelectorAll('.puffy-sticker').forEach(star => {
            star.addEventListener('click', function() {
                this.classList.toggle('text-[#F2B33D]');
                this.style.fontVariationSettings = this.style.fontVariationSettings === "'FILL' 1" ? "'FILL' 0" : "'FILL' 1";
                
                // Haptic feedback simulation
                if ('vibrate' in navigator) {
                    navigator.vibrate(10);
                }
            });
        });

        // Floating elements animation logic
        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            document.querySelectorAll('.masking-tape').forEach(tape => {
                tape.style.transform = `translateX(-50%) rotate(${1 + (scroll * 0.01)}deg)`;
            });
        });
    </script>
