name: Supabase backup

# 매일 새벽(KST 03:17) Supabase DB 를 통째로 덤프해서 GitHub Actions
# 아티팩트로 60일 보관. anon 키가 공개된 구조라 데이터 파괴·오조작이
# 원리적으로 가능하므로, 사고 시 여기서 복원한다.
# 복원: 아티팩트 다운로드 → Supabase SQL Editor 에서 data.sql 실행
#       (스키마는 migrations 로 재구축 가능하지만 schema.sql 도 함께 보관).
# Secrets 미설정 시엔 조용히 스킵 (supabase-migrate.yml 과 동일 패턴).

on:
  schedule:
    - cron: '17 18 * * *'   # 18:17 UTC = 03:17 KST
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secrets 확인 (없으면 스킵)
        id: gate
        run: |
          if [ -z "${{ secrets.SUPABASE_PROJECT_REF }}" ] || [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "run=0" >> "$GITHUB_OUTPUT"
            echo "::notice::Supabase Secrets 미설정 — 백업 스킵"
          else
            echo "run=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Supabase CLI
        if: steps.gate.outputs.run == '1'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Dump schema + data
        if: steps.gate.outputs.run == '1'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          mkdir -p backup
          supabase db dump --linked -f backup/schema.sql
          supabase db dump --linked --data-only -f backup/data.sql
          ls -la backup/

      - name: Upload artifact (60일 보관)
        if: steps.gate.outputs.run == '1'
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backup/
          retention-days: 60
