{% extends "base.html" %}
{% block title %}같이읽자 — 로드맵 관리{% endblock %}

{% block content %}
<div class="section-hd">
  <div><div class="eyebrow">로드맵 관리 · 모임장 전용</div><h2 class="h-2 mt-4">모임 준비</h2></div>
</div>

<div class="card">
  <div class="card__head">
    <h3 class="h-3">주제 목록</h3>
    <button class="btn btn-sm btn-pill" style="width:auto" onclick="document.getElementById('topic-form').style.display='block'">+ 추가</button>
  </div>
  <div id="topics-list"><p class="body-2 dim">불러오는 중...</p></div>
  <div id="topic-form" style="display:none" class="mt-12">
    <div class="field"><label>주제 제목</label><input class="input" id="topic-title" placeholder="주제 제목 (1~100자)"></div>
    <div class="field"><label>설명 (선택)</label><textarea class="input" id="topic-desc" placeholder="설명" rows="2"></textarea></div>
    <div class="row"><button class="btn btn-primary btn-pill" onclick="createTopic()">저장</button><button class="btn btn-pill" onclick="document.getElementById('topic-form').style.display='none'">취소</button></div>
  </div>
</div>

<div class="card">
  <div class="card__head">
    <h3 class="h-3">책 목록</h3>
    <button class="btn btn-sm btn-pill" style="width:auto" onclick="document.getElementById('book-form').style.display='block'">+ 추가</button>
  </div>
  <div id="books-list"><p class="body-2 dim">불러오는 중...</p></div>
  <div id="book-form" style="display:none" class="mt-12">
    <div class="field"><label>책 제목</label><input class="input" id="book-title" placeholder="책 제목 (1~100자)"></div>
    <div class="field"><label>읽는 이유</label><textarea class="input" id="book-reason" placeholder="읽는 이유 (1~500자)" rows="2"></textarea></div>
    <div class="row"><button class="btn btn-primary btn-pill" onclick="createBook()">저장</button><button class="btn btn-pill" onclick="document.getElementById('book-form').style.display='none'">취소</button></div>
  </div>
</div>

<button class="btn btn-primary btn-arrow btn-pill mt-12" onclick="startMeeting()">모임 시작 <span class="arr">→</span></button>
{% endblock %}

{% block extra_scripts %}
<script>
var token=sessionStorage.getItem('token');
var meetingId=sessionStorage.getItem('meeting_id');
if(!token||sessionStorage.getItem('is_host')!=='true') window.location.href='/';
var headers={'Authorization':'Bearer '+token,'Content-Type':'application/json'};

async function loadTopics(){
  var res=await fetch('/api/v1/topics',{headers:headers});
  var data=await res.json();
  var topics=data.data||[];
  document.getElementById('topics-list').innerHTML=topics.length
    ?topics.map(function(t){return '<span class="tag mb-8" style="margin-right:4px">'+t.title+'</span>'}).join('')
    :'<p class="body-2 dim">등록된 주제가 없습니다.</p>';
}
async function loadBooks(){
  var res=await fetch('/api/v1/books',{headers:headers});
  var data=await res.json();
  var books=data.data||[];
  document.getElementById('books-list').innerHTML=books.length
    ?books.map(function(b){return '<div class="answer mb-8"><div class="answer__body">'+b.title+'</div><p class="body-2 dim mt-8">'+b.reason+'</p></div>'}).join('')
    :'<p class="body-2 dim">등록된 책이 없습니다.</p>';
}
async function createTopic(){
  var title=document.getElementById('topic-title').value.trim();
  var description=document.getElementById('topic-desc').value.trim()||null;
  if(!title){showToast('주제 제목을 입력해주세요','error');return}
  var res=await fetch('/api/v1/topics',{method:'POST',headers:headers,body:JSON.stringify({title:title,description:description})});
  if(!res.ok){var d=await res.json();showToast(d.error?.message||'오류','error');return}
  document.getElementById('topic-form').style.display='none';
  loadTopics();showToast('주제 추가됨','success');
}
async function createBook(){
  var title=document.getElementById('book-title').value.trim();
  var reason=document.getElementById('book-reason').value.trim();
  if(!title||!reason){showToast('제목과 이유를 입력해주세요','error');return}
  var res=await fetch('/api/v1/books',{method:'POST',headers:headers,body:JSON.stringify({title:title,reason:reason})});
  if(!res.ok){var d=await res.json();showToast(d.error?.message||'오류','error');return}
  document.getElementById('book-form').style.display='none';
  loadBooks();showToast('책 추가됨','success');
}
async function startMeeting(){
  var res=await fetch('/api/v1/meetings/'+meetingId+'/stage',{method:'PATCH',headers:headers,body:JSON.stringify({stage:1})});
  if(!res.ok){var d=await res.json();showToast(d.error?.message||'오류','error');return}
  window.location.href='/session';
}
loadTopics();loadBooks();
</script>
{% endblock %}
