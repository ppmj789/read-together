# Schema for .claude/agents/*.md frontmatter (informal YAML; validator enforces programmatically)
# NOTE: lists are written in flow style ([a, b, c]) to match the validator's parser
# and the convention used in actual agent files. Do not convert to block-style lists.
required_fields: [name, description, tools, model, effort]
allowed_tools: [Read, Write, Edit, Glob, Grep, Bash, Agent, TaskCreate, TaskUpdate, TaskList, TaskGet, WebFetch, WebSearch]
allowed_models: [opus, sonnet, haiku]
allowed_efforts: [xhigh, high, medium, low]

required_body_sections:
  common: ["^# Role:", "^## Mission", "^## Responsibilities", "^## How You Report", "^## Artifacts You Own", "^## Rules", "^## Language"]
  has_agent_tool: ["^## Who You Call"]
  leaf_only: ["^## Escalation Protocol"]
