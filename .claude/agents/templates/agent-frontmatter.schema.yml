# Schema for .claude/agents/*.md frontmatter (informal YAML; validator enforces programmatically)
required_fields:
  - name           # kebab-case identifier
  - description    # free text (2-3 lines)
  - tools          # list of tool names
  - model          # one of: opus, sonnet, haiku
  - effort         # one of: xhigh, high, medium, low
allowed_tools:
  - Read
  - Write
  - Edit
  - Glob
  - Grep
  - Bash
  - Agent
  - TaskCreate
  - TaskUpdate
  - TaskList
  - TaskGet
  - WebFetch
  - WebSearch
allowed_models: [opus, sonnet, haiku]
allowed_efforts: [xhigh, high, medium, low]

required_body_sections:
  common:
    - "^# Role:"
    - "^## Mission"
    - "^## Responsibilities"
    - "^## How You Report"
    - "^## Artifacts You Own"
    - "^## Rules"
    - "^## Language"
  has_agent_tool:
    - "^## Who You Call"
  leaf_only:
    - "^## Escalation Protocol"
